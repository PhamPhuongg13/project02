<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- reset css -->
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <!-- embed fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <!-- styles -->
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <title>Dự án 2 - Luyện tập HTML CSS</title>
  </head>

  <body style="height: 10000px">
    <!-- Header -->
    <header class="header fixed">
      <div class="main-content">
        <div class="body">
          <!-- logo -->
          <a href="#!"
            ><img src="./assets/img/logo.svg" alt="" class="logo"
          /></a>

          <!-- nav -->
          <nav class="nav">
            <ul>
              <li>
                <a href="#!">Home</a>
              </li>
              <li>
                <a href="#!">Features</a>
              </li>
              <li>
                <a href="#!">Pricing</a>
              </li>
              <li>
                <a href="#!">About</a>
              </li>
              <li>
                <a href="#!">Contact</a>
              </li>
            </ul>
          </nav>

          <!-- btn -->
          <div class="action">
            <a href="#!" class="action-link">Sign in</a>
            <a href="#!" class="action-btn">Sign up</a>
          </div>
        </div>
      </div>
    </header>

    <!-- Hero-->
    <div class="hero">
      <div class="main-content">
        <div class="body">
          <!-- Left - Content block -->
          <div class="content-block">
            <p class="top-title">😎 EASY LEARNING PLATFORM</p>
            <h1 class="title">Words learner come here.</h1>
            <p class="desc">
              Build skills with courses, certificates, and get online knowledge
              from our world-class platform.
            </p>
            <div class="cta-group">
              <a href="#!" class="btn">Get Started</a>
              <div class="play-video">
                <img src="./assets/icon/play.svg" alt="play video" />
              </div>
            </div>
          </div>

          <!-- Right - Media block -->
          <div class="media-block">
            <img
              src="./assets/img/teachers.jpg"
              alt="Words learner come here."
              class="image"
            />

            <div class="media-course">
              <img
                src="./assets/icon/Book.svg"
                alt="course icon"
                class="course-icon"
              />
              <span class="detail">Courses 1000+</span>
            </div>

            <div class="media-schedules">
              <span class="detail">Schedules</span>
              <img
                src="./assets/icon/schedules1.svg"
                alt="Schedules icon"
                class="schedules-icon icon-1"
              />
              <img
                src="./assets/icon/schedules2.svg"
                alt="Schedules icon"
                class="schedules-icon icon-2"
              />
              <img
                src="./assets/icon/schedules3.svg"
                alt="Schedules icon"
                class="schedules-icon icon-3"
              />
              <img
                src="./assets/icon/schedules4.svg"
                alt="Schedules icon"
                class="schedules-icon icon-4"
              />
            </div>

            <div class="avatar-block">
              <span class="detail">Our Active Students</span>
              <div class="ava-list">
                <img src="./assets/icon/ava1.svg" alt="avatar 1" class="ava" />
                <img src="./assets/icon/ava2.svg" alt="avatar 2" class="ava" />
                <img src="./assets/icon/ava3.svg" alt="avatar 3" class="ava" />
                <img src="./assets/icon/ava4.svg" alt="avatar 4" class="ava" />
                <div class="ava avar-more">
                  <span>10K+</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
